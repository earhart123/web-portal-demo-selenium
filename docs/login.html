<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GamePortal - 로그인</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { background: #fff; padding: 48px 40px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 400px; }
    .logo { text-align: center; font-size: 24px; font-weight: 700; color: #2d6ef6; margin-bottom: 32px; }
    h1 { font-size: 18px; font-weight: 600; color: #222; margin-bottom: 24px; }
    .field { position: relative; margin-bottom: 16px; }
    .field label { position: absolute; top: 14px; left: 14px; font-size: 14px; color: #999; pointer-events: none; transition: all 0.2s; }
    .field input { width: 100%; padding: 20px 14px 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    .field input:focus { border-color: #2d6ef6; }
    .field input:focus + label,
    .field input:not(:placeholder-shown) + label { top: 5px; font-size: 11px; color: #2d6ef6; }
    .field input::placeholder { color: transparent; }
    .btn-primary { width: 100%; padding: 14px; background: #2d6ef6; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn-primary:hover { background: #1a5ae0; }
    .error-message { color: #e53e3e; font-size: 13px; margin-top: 8px; display: none; }
    .links { display: flex; justify-content: space-between; margin-top: 16px; font-size: 13px; }
    .links a { color: #2d6ef6; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">🎮 GamePortal</div>
  <h1>로그인</h1>
  <form id="login-form" novalidate>
    <div class="field">
      <input type="email" id="email" name="email" placeholder="이메일" autocomplete="off" data-qa="login-email" />
      <label for="email">이메일</label>
    </div>
    <div class="field">
      <input type="password" id="password" name="password" placeholder="비밀번호" data-qa="login-password" />
      <label for="password">비밀번호</label>
    </div>
    <p id="error-message" class="error-message" data-qa="login-error">이메일 또는 비밀번호를 확인해주세요.</p>
    <button type="submit" id="login-btn" class="btn-primary" data-qa="login-submit">로그인</button>
  </form>
  <div class="links">
    <a href="password-reset.html" id="link-password-reset" data-qa="link-password-reset">비밀번호 재설정</a>
    <a href="signup.html" id="link-signup" data-qa="link-signup">회원가입</a>
  </div>
</div>
<script>
  const VALID_EMAIL = 'test@gameportal.com';
  const VALID_PASSWORD = 'Test1234!';
  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error-message');
    if (email === VALID_EMAIL && password === VALID_PASSWORD) {
      errorEl.style.display = 'none';
      window.location.href = 'main.html';
    } else {
      errorEl.style.display = 'block';
    }
  });
</script>
</body>
</html>
