<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GamePortal - 비밀번호 재설정</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { background: #fff; padding: 48px 40px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 400px; }
    .logo { text-align: center; font-size: 24px; font-weight: 700; color: #2d6ef6; margin-bottom: 24px; }
    h1 { font-size: 18px; font-weight: 600; color: #222; margin-bottom: 8px; }
    .desc { font-size: 13px; color: #777; margin-bottom: 24px; }
    .field { position: relative; margin-bottom: 16px; }
    .field label { position: absolute; top: 14px; left: 14px; font-size: 14px; color: #999; pointer-events: none; transition: all 0.2s; }
    .field input { width: 100%; padding: 20px 14px 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    .field input:focus { border-color: #2d6ef6; }
    .field input:focus + label,
    .field input:not(:placeholder-shown) + label { top: 5px; font-size: 11px; color: #2d6ef6; }
    .field input::placeholder { color: transparent; }
    .btn-primary { width: 100%; padding: 14px; background: #2d6ef6; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn-primary:hover { background: #1a5ae0; }
    .success-msg { color: #4caf50; font-size: 13px; margin-top: 12px; display: none; }
    .back-link { display: block; text-align: center; margin-top: 14px; font-size: 13px; color: #2d6ef6; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">🎮 GamePortal</div>
  <h1>비밀번호 재설정</h1>
  <p class="desc">가입하신 이메일 주소를 입력하시면 재설정 링크를 보내드립니다.</p>
  <div class="field">
    <input type="email" id="reset-email" placeholder="이메일" data-qa="reset-email" autocomplete="off"/>
    <label for="reset-email">이메일</label>
  </div>
  <button id="btn-reset-submit" class="btn-primary" data-qa="btn-reset-submit">재설정 링크 전송</button>
  <p id="reset-success" class="success-msg" data-qa="reset-success">입력하신 이메일로 재설정 링크를 전송했습니다.</p>
  <a href="login.html" class="back-link" data-qa="link-back-login">로그인으로 돌아가기</a>
</div>
<script>
  document.getElementById('btn-reset-submit').addEventListener('click', function() {
    const email = document.getElementById('reset-email').value;
    if (email && email.includes('@')) {
      document.getElementById('reset-success').style.display = 'block';
    }
  });
</script>
</body>
</html>
